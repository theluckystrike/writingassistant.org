  <style>

  <meta property="og:title" content="Passive Voice Converter — Active Voice Suggestions">
  <meta property="og:description" content="Detect passive voice sentences and convert them to active voice. Improve writing clarity with passive-to-active conversion suggestions.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://writingassistant.org/tools/passive-voice-converter">
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1><span>passive voice</span> converter</h1>
      <div class="subhead">Detect · Convert · Improve Clarity</div>
    </div>
    <div style="color:#777; font-size:0.85rem;">⚡ real‑time analysis</div>
  </header>

  <div class="grid-2">
    <div>
      <textarea id="textInput" placeholder="Paste or type your text here...">The report was written by the team. Sarah completed the project ahead of schedule. The decision was made by the committee without consulting stakeholders. We approved the budget proposal. The presentation was given by John in the conference room. The cake was eaten quickly by the children. The software is being updated by the developers. Our company was founded in 1995.</textarea>
    </div>
    <div class="stats-panel" id="statsPanel">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- passive voice conversions -->
  <div class="passive-section" id="conversionSection">
    <div class="section-title">🔍 Passive Voice Detected</div>
    <div id="conversionContainer" class="conversion-list"></div>
    <div class="note">Note: Suggestions assume clear actors. Review context before applying changes.</div>
  </div>

  <footer>
    <a href="https://writingassistant.org/">writingassistant.org</a> — © 2026 writingassistant.org — Writing Tools
  </footer>
</div>

<script>
  (function() {
    const textarea = document.getElementById('textInput');
    const statsPanel = document.getElementById('statsPanel');
    const conversionContainer = document.getElementById('conversionContainer');

    // Common passive voice patterns: "was/were + past participle" or "is/are being + past participle"
    const passivePattern = /\b(is|are|was|were|be|being|been)\s+(?:being\s+)?([a-z]+ed|taken|given|made|seen|known|found|written|done|placed|set|sold|bought|sent|shown|told|brought|chosen|meant|put|read|understood|suggested|considered|believed|expected|kept|left|paid|appeared|received|heard|called|included|involved|required|involved|offered|allowed|provided|supplied|promised|arranged|ordered|asked|forced|persuaded|encouraged|enabled|helped|advised|warned|taught|shown|told|informed|reminded|convinced|assured|guaranteed|claimed|alleged|reported|stated|said|mentioned|noted|indicated|suggested|proposed|recommended|submitted|presented|introduced|demonstrated|illustrated|displayed|exhibited|exposed|revealed|showed|projected|screened|broadcast|published|issued|released|distributed|circulated|shared|exchanged|traded|transferred|delivered|shipped|mailed|sent|communicated|transmitted|conveyed|imparted|expressed|voiced|stated|declared|announced|proclaimed|asserted|maintained|insisted|swore|testified|confessed|admitted|acknowledged|granted|conceded|yielded|surrendered|submitted)\b/i;

    function detectPassiveVoice(text) {
      const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
      const passiveSentences = [];

      sentences.forEach((sent) => {
        const trimmed = sent.trim();
        if (passivePattern.test(trimmed)) {
          // Extract subject and suggested active version
          const subjectMatch = trimmed.match(/^([a-zA-Z\s]+?)\s+(?:was|were|is|are|being|been|be)/i);
          const subject = subjectMatch ? subjectMatch[1].trim() : 'Unknown';

          passiveSentences.push({
            original: trimmed,
            subject: subject,
            suggestion: generateActiveSuggestion(trimmed, subject)
          });
        }
      });

      return passiveSentences;
    }

    function generateActiveSuggestion(sentence, subject) {
      // Simple heuristic: Look for "by [actor]" pattern
      const byMatch = sentence.match(/by\s+([a-zA-Z\s]+?)[\.,]/);
      if (byMatch) {
        const actor = byMatch[1].trim();
        // Remove passive structure and restructure with actor as subject
        const withoutPassive = sentence.replace(/was\s+|were\s+|is\s+|are\s+|being\s+/i, '').replace(/\s+by\s+[a-zA-Z\s]+/i, '');
        return `"${actor} " + [verb in active form] + " ${subject}". For example: "${actor} ${extractVerb(sentence, actor)}..."`;
      }
      return `Consider restructuring with an active agent as the subject instead of "${subject}".`;
    }

    function extractVerb(sentence, actor) {
      const verbMatch = sentence.match(/\b(was|were|is|are|being|been|be)\s+(?:being\s+)?([a-z]+ed|taken|given|made|seen|known|found|written|done)\b/i);
      return verbMatch ? verbMatch[2].replace(/ed$/, 'es') : 'acts';
    }

    function analyzeVoiceRatio(text) {
      const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
      const totalSentences = sentences.length;
      const passiveSentences = sentences.filter(s => passivePattern.test(s)).length;
      const activeSentences = totalSentences - passiveSentences;

      return {
        total: totalSentences,
        passive: passiveSentences,
        active: activeSentences,
        passivePercent: totalSentences > 0 ? (passiveSentences / totalSentences) * 100 : 0,
        activePercent: totalSentences > 0 ? (activeSentences / totalSentences) * 100 : 0
      };
    }

    function updateUI() {
      const text = textarea.value;
      const passive = detectPassiveVoice(text);
      const ratio = analyzeVoiceRatio(text);

      // stats panel
      const recommendation = ratio.passivePercent > 30 ? 'Consider reducing passive voice' : 'Good balance of active and passive voice';
      let html = `
        <div class="score-badge">${ratio.passive} passive sentences</div>
        <div class="stat-row">
          <div class="stat-item"><span class="label">total sentences</span><span class="value">${ratio.total}</span></div>
          <div class="stat-item"><span class="label">active</span><span class="value">${ratio.active}</span></div>
          <div class="stat-item"><span class="label">passive</span><span class="value">${ratio.passive}</span></div>
        </div>
        <div class="ratio-bar">
          <div class="ratio-label">Voice Ratio</div>
          <div class="ratio-visual">
            <div class="ratio-active" style="width: ${ratio.activePercent}%;"></div>
            <div class="ratio-passive" style="width: ${ratio.passivePercent}%;"></div>
          </div>
          <div class="ratio-text">${ratio.activePercent.toFixed(1)}% active / ${ratio.passivePercent.toFixed(1)}% passive</div>
        </div>
        <div style="color: #aaa; font-size: 0.9rem; margin-top: 1rem;">💡 ${recommendation}</div>
      `;
      statsPanel.innerHTML = html;

      // conversions list
      let conversionHtml = '';
      if (passive.length === 0) {
        conversionHtml = '<div class="no-passive">✓ No passive voice constructions detected. Your text uses active voice well!</div>';
      } else {
        conversionHtml = passive.map((item, idx) => `
          <div class="conversion-item">
            <div class="conversion-original">Passive (Sentence ${idx + 1})</div>
            <div class="conversion-text">"${escapeHtml(item.original)}"</div>
            <div class="conversion-suggested">✓ Suggested active version: ${escapeHtml(item.suggestion)}</div>
          </div>
        `).join('');
      }
      conversionContainer.innerHTML = conversionHtml;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // initial render
    updateUI();
    textarea.addEventListener('input', updateUI);
  })();
</script>
</body>
</html>
